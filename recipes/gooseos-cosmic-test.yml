---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: gooseos-cosmic-test
description: Personal Fedora Atomic COSMIC image for Intel and non-NVIDIA systems.

base-image: ghcr.io/blue-build/base-images/fedora-base
image-version: latest

modules:
  - from-file: common-test-modules.yml
  - type: os-release
    properties:
      NAME: GooseOS
      PRETTY_NAME: Cosmic-Test
      VARIANT: TEST
      VARIANT_ID: TEST
  - type: script
    no-cache: true
    scripts:
      - set-gooseos-version.sh
    
  - type: signing
