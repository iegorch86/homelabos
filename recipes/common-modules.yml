---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: files
    files:
      - source: system
        destination: /
   
  - type: dnf
    repos:
      copr:
        - atim/starship
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      keys:
        - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc

    install:
      install-weak-deps: false
      packages:
        # COSMIC desktop
        - cosmic-edit
        - cosmic-files
        - cosmic-session
        - cosmic-greeter
        - cosmic-store
        - cosmic-term
        - cosmic-initial-setup
        - cosmic-player
        - cosmic-wallpapers

        # COSMIC integration
        - flatpak
        - gnome-keyring-pam
        - toolbox
        - playerctl
        - pop-sound-theme

        # Dell Latitude / laptop hardware support
        - bolt
        - fwupd
        - iio-sensor-proxy
        - libwacom
        - libwacom-data
        - fprintd
        - fprintd-pam

        # Applications
        - gnome-calculator
        - okular

        # Profiling
        - sysprof
        - bpftrace
        - perf
        
        # Terminal
        - fastfetch
        - micro
        - starship
        
        # Scanning
        - sane-backends
        - sane-backends-drivers-scanners
        - sane-airscan
        
        # Printing
        - cups
        - cups-pk-helper
        - system-config-printer
        - cups-filters
        - cups-filters-driverless
        - cups-browsed
        - ipp-usb
        - avahi
        - bluez-cups
        
        # Virtualization
        - qemu-kvm
        - libvirt
        - virt-manager
        - virt-viewer
        - libvirt-nss
        - osinfo-db
        - osinfo-db-tools

        # Network diagnostics
        - nmap
        - mtr
        - iperf3
        - bind-utils
        - wireshark-cli
        - netcat
        - net-tools
        - tcpdump
        - traceroute
        - ethtool

        # Hardware diagnostics
        - nvme-cli
        - smartmontools
        - lm_sensors
        - lshw
        - pciutils
        - usbutils
        - dmidecode

        # Storage and filesystem support
        - cifs-utils
        - nfs-utils
        - ntfs-3g
        - exfatprogs
        - dosfstools
        - gdisk
        - gparted

        # General diagnostics
        - htop
        - iotop-c
        - lsof
        - strace

        # Browser
        - brave-browser
        
  - type: script
    scripts:
        - set-default-wallpaper.sh
    
  - type: brew

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - app.zen_browser.zen
          - org.kde.kate
          - org.kde.kdenlive
          - org.shotcut.Shotcut
          - com.ranfdev.DistroShelf
          - com.github.tchx84.Flatseal
          - io.podman_desktop.PodmanDesktop
          - io.missioncenter.MissionCenter

    

  - type: initramfs
