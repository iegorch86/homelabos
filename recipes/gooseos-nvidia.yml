---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: gooseos-nvidia-open
description: Personal Fedora Atomic COSMIC image for NVIDIA systems.

base-image: ghcr.io/blue-build/base-images/fedora-base-nvidia-open
image-version: latest

modules:
  - from-file: common-modules.yml

  - type: dnf
    install:
      packages:
        - switcheroo-control
    - type: os-release
    properties:
      NAME: GooseOS
      PRETTY_NAME: GooseOS NVIDIA Open
      VARIANT: NVIDIA Open
      VARIANT_ID: nvidia-open
      
  - type: signing
