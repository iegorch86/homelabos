---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image publishes to ghcr.io/iegorch86/homelabos
name: homelabos
description: Personal COSMIC atomic image — DE-less NVIDIA base with COSMIC layered from Fedora repos.

# DE-less NVIDIA-open base (Fedora 44 base-atomic + nvidia). Codecs (negativo17) and
# the QOL package set are already baked in via the base's common.yml — so no RPM Fusion,
# and distrobox/tcpdump/traceroute/htop/etc. come from the base.
base-image: ghcr.io/blue-build/base-images/fedora-base-nvidia-open
# CONFIRM tags on the ghcr package page; pin to 44 for stability if you prefer.
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - atim/starship
      # Brave official RPM repo + key
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      keys:
        - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
    install:
      packages:
        # COSMIC desktop, installed from Fedora repos → each build pulls the latest stable
        - "@cosmic-desktop-environment"
        # terminal
        - micro
        - starship
        # virtualization
        - qemu-kvm
        - libvirt
        - virt-manager
        - virt-viewer
        # network diagnostics (these are NOT in the base)
        - nmap
        - mtr
        - iperf3
        - bind-utils
        - wireshark-cli
        # disk
        - gparted
        # profiling
        - sysprof
        - bpftrace
        - perf
        # browser (native, from Brave repo above)
        - brave-browser
    # Firefox intentionally KEPT as a backup browser — no remove block.

  # Homebrew (not in the base)
  - type: brew

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - app.zen_browser.zen            # Zen browser
          - org.kde.kate                   # Kate editor
          - org.kde.kdenlive               # Kdenlive
          - org.shotcut.Shotcut            # Shotcut
          - com.ranfdev.DistroShelf        # distrobox GUI — confirm ID on Flathub
          - com.github.tchx84.Flatseal     # Flatpak permissions
          - io.podman_desktop.PodmanDesktop # Podman Desktop — confirm ID on Flathub
      - scope: user

  - type: signing
